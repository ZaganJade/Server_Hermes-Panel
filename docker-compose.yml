services:
  hermes-panel:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: hermes-panel
    ports:
      - "8080:8080"
    volumes:
      - ./Project:/var/www/html/Project
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
    restart: unless-stopped
    stdin_open: true
    tty: true

  # Optional: Panel database (uncomment if needed)
